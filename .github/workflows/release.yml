name: Release

# Cut a release by pushing a semver tag:  git tag v0.1.0 && git push origin v0.1.0
# (or run manually via the Actions tab with a tag input).
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write # create the GitHub Release + upload assets

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install wails3 CLI + NSIS
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.98
          "$(go env GOPATH)\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          choco install nsis -y --no-progress
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          $version = $tag -replace '^v', ''
          "tag=$tag"         | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Releasing $tag (version $version)"

      - name: Stamp version into the Win32 resource (info.json)
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          $p = "build/windows/info.json"
          $j = Get-Content $p -Raw | ConvertFrom-Json
          $j.fixed.file_version = $v
          $j.info.'0000'.ProductVersion = $v
          $j | ConvertTo-Json -Depth 10 | Set-Content $p
          Get-Content $p

      - name: Build binary (frontend + Go, version-injected)
        # Injects -X main.version=<version> via the VERSION var (see build/windows/Taskfile.yml).
        run: wails3 task windows:build PACKAGE_MANAGER=bun VERSION=${{ steps.ver.outputs.version }}

      - name: Build NSIS installer (per-user, no UAC)
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          $root = (Get-Location).Path
          wails3 generate webview2bootstrapper -dir build/windows/nsis
          # Quote each -D arg: PowerShell otherwise splits "...=0.1.0" at the dots.
          makensis "-DINFO_PRODUCTVERSION=$v" "-DWAILS_INSTALL_SCOPE=user" "-DREQUEST_EXECUTION_LEVEL=user" "-DARG_WAILS_AMD64_BINARY=$root\bin\toru.exe" build/windows/nsis/project.nsi

      - name: Assemble release assets (installer + portable zip + SHA256SUMS)
        id: assets
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          $installer = "toru-$v-windows-amd64-installer.exe"
          $zip       = "toru-$v-windows-amd64.zip"
          Copy-Item "bin/toru-amd64-installer.exe" $installer
          Compress-Archive -Path "bin/toru.exe" -DestinationPath $zip -Force
          $lines = foreach ($f in @($installer, $zip)) {
            "{0}  {1}" -f (Get-FileHash -Algorithm SHA256 $f).Hash.ToLower(), $f
          }
          $lines -join "`n" | Out-File -Encoding ascii -NoNewline SHA256SUMS
          Get-Content SHA256SUMS
          "installer=$installer" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "zip=$zip"             | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Toru ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.assets.outputs.installer }}
            ${{ steps.assets.outputs.zip }}
            SHA256SUMS
